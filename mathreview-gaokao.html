<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>考研数学 · 每日复习</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/app.css">
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</head>
<body>

<div class="app-shell">

  <header class="top-header">
    <div class="brand">考研数学</div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="App.toggleTheme()" aria-label="切换主题">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </header>

  <aside class="tablet-sidebar">
    <div class="sidebar-brand">考研数学</div>
    <button class="sidebar-nav-item active" data-nav="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      首页
    </button>
    <button class="sidebar-nav-item" data-nav="formula">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      公式
    </button>
    <button class="sidebar-nav-item" data-nav="practice">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      练习
    </button>
    <button class="sidebar-nav-item" data-nav="errors">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      错题
    </button>
    <button class="sidebar-nav-item" data-nav="mastery">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      掌握
    </button>
    <div class="sidebar-divider"></div>
    <div class="sidebar-theme-toggle">
      <button class="sidebar-nav-item" onclick="App.toggleTheme()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        主题
      </button>
    </div>
  </aside>

  <section class="screen active" id="screen-home"><div id="home-content"></div></section>
  <section class="screen" id="screen-formula"><div id="formula-content"></div></section>
  <section class="screen" id="screen-practice"><div id="practice-content"></div></section>
  <section class="screen" id="screen-errors"><div id="errors-content"></div></section>
  <section class="screen" id="screen-mastery"><div id="mastery-content"></div></section>

  <nav class="bottom-nav">
    <button class="tab-btn active" data-nav="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </button>
    <button class="tab-btn" data-nav="formula">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>公式</span>
    </button>
    <button class="tab-btn" data-nav="practice">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>练习</span>
    </button>
    <button class="tab-btn" data-nav="errors">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      <span>错题</span>
    </button>
    <button class="tab-btn" data-nav="mastery">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>掌握</span>
    </button>
  </nav>

</div>

<script>
// Render Home
function renderHome(data) {
  const t = data.todayTasks;
  const pct = Math.round((t.completed / t.totalProblems) * 100);
  document.getElementById('home-content').innerHTML = `
    <h1 class="screen-title">${t.date}</h1>
    <div class="card">
      <div class="card-header">
        <div><div class="card-title">今日复习</div>
          <div class="card-subtitle">预计 ${t.estimatedMinutes} 分钟 · 共 ${t.totalProblems} 题</div>
        </div>
        <div style="font-family:var(--font-display);font-size:1.8rem;color:var(--accent);">${pct}%</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-labels"><span>已完成 ${t.completed} 题</span><span>剩余 ${t.totalProblems - t.completed} 题</span></div>
    </div>
    <div class="card">
      <div class="card-title mb-3">章节任务</div>
      ${t.sections.map(s=>{
        const sp = Math.round((s.completed/s.problems)*100);
        return `<div class="mb-3">
          <div class="flex justify-between mb-1"><span style="font-size:0.9rem;font-weight:500">${s.name}</span><span style="font-size:0.8rem;color:var(--dim)">${s.completed}/${s.problems} 题</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${sp}%"></div></div>
        </div>`;
      }).join('')}
    </div>
    <div class="card" style="border-color:var(--accent);background:var(--accent-bg)">
      <div class="card-header"><div class="flex items-center gap-2"><span class="tag tag-ai">AI</span><span class="card-title" style="font-size:0.95rem">新增题目</span></div></div>
      ${t.aiSuggestions.map(ai=>`
        <div class="mb-3">
          <div class="flex items-center gap-2 mb-2">
            <span class="tag tag-${ai.difficulty==='basic'?'basic':ai.difficulty==='advanced'?'advanced':'exam'}">${ai.difficulty==='basic'?'基础':ai.difficulty==='advanced'?'强化':'真题'}</span>
            <span style="font-size:0.8rem;color:var(--dim)">${ai.chapter} · ${ai.type}</span>
          </div>
          <div class="formula-body katex-render" data-latex="${ai.content.replace(/"/g,'&quot;')}"></div>
        </div>
      `).join('')}
    </div>
    <div class="flex gap-3 mb-5">
      <button class="btn btn-primary w-full" onclick="App.goTo('practice')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>开始练习</button>
      <button class="btn btn-secondary w-full" onclick="App.goTo('formula')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>背诵公式</button>
    </div>
  `;
}

// Render Formula
let formulaFilter = 'all';
function renderFormulas(data) {
  const chapters = [...new Set(data.formulas.map(f => f.chapter))];
  const filtered = formulaFilter === 'all' ? data.formulas :
    formulaFilter === 'bookmarked' ? data.formulas.filter(f => f.bookmarked) :
    data.formulas.filter(f => f.chapter === formulaFilter);
  document.getElementById('formula-content').innerHTML = `
    <h1 class="screen-title">公式 · 知识点</h1>
    <div class="flex gap-2 mb-4" style="flex-wrap:wrap">
      <button class="btn btn-sm ${formulaFilter==='all'?'btn-primary':'btn-secondary'}" onclick="setFF('all')">全部</button>
      <button class="btn btn-sm ${formulaFilter==='bookmarked'?'btn-primary':'btn-secondary'}" onclick="setFF('bookmarked')">收藏</button>
      ${chapters.map(c=>`<button class="btn btn-sm ${formulaFilter===c?'btn-primary':'btn-secondary'}" onclick="setFF('${c}')">${c}</button>`).join('')}
    </div>
    ${filtered.map(f=>`
      <div class="formula-card">
        <div class="formula-header">
          <div><div class="formula-title">${f.title}</div><div class="formula-chapter">${f.chapter}</div></div>
          <button class="bookmark-btn ${f.bookmarked?'bookmarked':''}" onclick="App.toggleFormulaBookmark('${f.id}')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="${f.bookmarked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          </button>
        </div>
        <div class="formula-body katex-render" data-display="true" data-latex="${f.latex.replace(/"/g,'&quot;')}"></div>
        <div class="formula-desc">${f.description}</div>
      </div>
    `).join('')}
  `;
}
window.setFF = function(f) { formulaFilter = f; App.renderAll(); App.renderKaTeX(); };

// Render Practice
let currentProblemIdx = 0;
let practiceFilter = 'all';
function renderPractice(data) {
  const chapters = [...new Set(data.problems.map(p => p.chapter))];
  let probs = practiceFilter === 'all' ? data.problems :
    practiceFilter === 'bookmarked' ? data.problems.filter(p => p.bookmarked) :
    data.problems.filter(p => p.chapter === practiceFilter);
  if (currentProblemIdx >= probs.length) currentProblemIdx = 0;
  const prob = probs[currentProblemIdx] || data.problems[0];
  const diffTag = prob.difficulty === 'basic' ? 'tag-basic' : prob.difficulty === 'advanced' ? 'tag-advanced' : 'tag-exam';
  const diffLabel = prob.difficulty === 'basic' ? '基础' : prob.difficulty === 'advanced' ? '强化' : '真题';

  document.getElementById('practice-content').innerHTML = `
    <h1 class="screen-title">练习</h1>
    <div class="flex gap-2 mb-4" style="flex-wrap:wrap">
      <button class="btn btn-sm ${practiceFilter==='all'?'btn-primary':'btn-secondary'}" onclick="setPF('all')">全部</button>
      <button class="btn btn-sm ${practiceFilter==='bookmarked'?'btn-primary':'btn-secondary'}" onclick="setPF('bookmarked')">收藏</button>
      ${chapters.map(c=>`<button class="btn btn-sm ${practiceFilter===c?'btn-primary':'btn-secondary'}" onclick="setPF('${c}')">${c}</button>`).join('')}
    </div>
    <div class="problem-card">
      <div class="problem-header">
        <span class="tag ${diffTag}">${diffLabel}</span>
        <span class="tag tag-source">${prob.source}</span>
        <span class="tag" style="background:var(--accent-bg);color:var(--accent)">${prob.type}</span>
      </div>
      <div class="problem-content katex-render" data-latex="${prob.content.replace(/"/g,'&quot;')}"></div>
      <div class="problem-options">
        ${prob.options.map(opt=>{
          const sel = App.selectedOption;
          const cls = !sel ? '' : sel === opt.label ? (sel === prob.correct ? 'correct' : 'wrong') : opt.label === prob.correct ? 'correct' : '';
          return `<button class="option-row ${cls}" onclick="${sel?'':'App.selectOption(\''+opt.label+'\')'}" ${sel?'disabled':''}>
            <span class="option-label">${opt.label}</span>
            <span class="katex-render" data-latex="${opt.text.replace(/"/g,'&quot;')}"></span>
          </button>`;
        }).join('')}
      </div>
      ${App.showExplanation ? `
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--space-4);margin-top:var(--space-3)">
          <div style="font-weight:600;margin-bottom:var(--space-2);color:var(--fg)">解析</div>
          <div class="katex-render" data-display="true" data-latex="${prob.explanation.replace(/"/g,'&quot;')}"></div>
        </div>
        <div class="flex gap-2 mt-3">
          <button class="btn btn-secondary btn-sm" onclick="App.resetProblem()">再做一题</button>
          <button class="btn btn-ghost btn-sm" onclick="App.toggleProblemBookmark('${prob.id}')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="${prob.bookmarked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            ${prob.bookmarked?'已收藏':'收藏'}
          </button>
        </div>
      ` : ''}
      ${!App.showExplanation ? `
        <div class="flex justify-between items-center mt-2">
          <span style="font-size:0.8rem;color:var(--dim)">第 ${currentProblemIdx + 1} / ${probs.length} 题</span>
          <div class="flex gap-2">
            <button class="btn btn-ghost btn-sm" onclick="prevProblem()" ${currentProblemIdx===0?'disabled':''}>上一题</button>
            <button class="btn btn-ghost btn-sm" onclick="nextProblem()" ${currentProblemIdx===probs.length-1?'disabled':''}>下一题</button>
          </div>
        </div>
      ` : ''}
    </div>
  `;
}
window.setPF = function(f) { practiceFilter = f; currentProblemIdx = 0; App.resetProblem(); };
window.nextProblem = function() { currentProblemIdx++; App.resetProblem(); };
window.prevProblem = function() { currentProblemIdx--; App.resetProblem(); };

// Render Errors
let errorFilter = 'all';
function renderErrors(data) {
  const chapters = [...new Set(data.errors.map(e => e.chapter))];
  const filtered = errorFilter === 'all' ? data.errors : data.errors.filter(e => e.chapter === errorFilter);
  document.getElementById('errors-content').innerHTML = `
    <h1 class="screen-title">错题本</h1>
    <div class="stats-grid mb-4">
      <div class="stat-box"><div class="stat-value">${data.errors.length}</div><div class="stat-label">错题总数</div></div>
      <div class="stat-box"><div class="stat-value">${data.errors.filter(e=>e.reviewCount===0).length}</div><div class="stat-label">待复习</div></div>
    </div>
    <div class="flex gap-2 mb-4" style="flex-wrap:wrap">
      <button class="btn btn-sm ${errorFilter==='all'?'btn-primary':'btn-secondary'}" onclick="setEF('all')">全部</button>
      ${chapters.map(c=>`<button class="btn btn-sm ${errorFilter===c?'btn-primary':'btn-secondary'}" onclick="setEF('${c}')">${c}</button>`).join('')}
    </div>
    ${filtered.map(e=>{
      const prob = data.problems.find(p=>p.id===e.problemId);
      return `
      <div class="list-item">
        <div class="list-item-left">
          <div class="list-item-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          </div>
          <div>
            <div class="list-item-title">${prob?prob.chapter:e.chapter}</div>
            <div class="list-item-meta">${e.source} · 错选 ${e.wrongAnswer} · 正解 ${e.correctAnswer} · ${e.wrongDate}</div>
          </div>
        </div>
        <span class="tag ${e.reviewCount>0?'tag-basic':'tag-exam'}">${e.reviewCount>0?'已复习 '+e.reviewCount+' 次':'待复习'}</span>
      </div>`;
    }).join('')}
  `;
}
window.setEF = function(f) { errorFilter = f; App.renderAll(); };

// Render Mastery
function renderMastery(data) {
  const m = data.mastery;
  const overallPct = Math.round((m.totalCorrect / m.totalSolved) * 100) || 0;
  const chapters = m.chapters;
  const n = chapters.length;
  const size = 280, cx = size/2, cy = size/2, r = 100;
  const maxVal = Math.max(...chapters.map(c=>c.totalProblems));

  function pt(i, val) {
    const angle = (Math.PI*2*i/n) - Math.PI/2;
    const dist = (val/maxVal)*r;
    return `${cx+dist*Math.cos(angle)},${cy+dist*Math.sin(angle)}`;
  }

  const gridPolygons = [0.25,0.5,0.75,1].map(level=>{
    const pts = chapters.map((_,i)=>pt(i,maxVal*level)).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="var(--border)" stroke-width="1"/>`;
  }).join('');

  const dataPts = chapters.map((c,i)=>pt(i,c.correct)).join(' ');
  const labelPts = chapters.map((c,i)=>{
    const angle = (Math.PI*2*i/n) - Math.PI/2;
    return `<text x="${cx+(r+22)*Math.cos(angle)}" y="${cy+(r+22)*Math.sin(angle)}" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="var(--muted)" font-family="var(--font-body)">${c.name}</text>`;
  }).join('');

  const axisLines = chapters.map((_,i)=>{
    const angle = (Math.PI*2*i/n) - Math.PI/2;
    return `<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(angle)}" y2="${cy+r*Math.sin(angle)}" stroke="var(--border)" stroke-width="1"/>`;
  }).join('');

  document.getElementById('mastery-content').innerHTML = `
    <h1 class="screen-title">掌握度</h1>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-value">${m.totalSolved}</div><div class="stat-label">总做题数</div></div>
      <div class="stat-box"><div class="stat-value">${overallPct}%</div><div class="stat-label">正确率</div></div>
      <div class="stat-box"><div class="stat-value">${m.streakDays}</div><div class="stat-label">连续打卡</div></div>
      <div class="stat-box"><div class="stat-value">${Math.floor(m.totalStudyMinutes/60)}h${m.totalStudyMinutes%60}m</div><div class="stat-label">学习时长</div></div>
    </div>
    <div class="radar-container">
      <div class="card-title mb-3">章节掌握度</div>
      <svg class="radar-svg" viewBox="0 0 ${size} ${size}">
        ${gridPolygons}
        ${axisLines}
        <polygon points="${dataPts}" fill="rgba(201,100,66,0.15)" stroke="var(--accent)" stroke-width="2"/>
        ${chapters.map((c,i)=>{const [x,y]=pt(i,c.correct).split(',');return `<circle cx="${x}" cy="${y}" r="4" fill="var(--accent)"/>`;}).join('')}
        ${labelPts}
      </svg>
    </div>
    <div class="card">
      <div class="card-title mb-3">各章节详情</div>
      ${chapters.map(c=>{
        const pct = Math.round((c.correct/c.totalProblems)*100);
        return `<div class="mb-3">
          <div class="flex justify-between mb-1"><span style="font-size:0.9rem;font-weight:500">${c.name}</span><span style="font-size:0.8rem;color:var(--dim)">${c.correct}/${c.totalProblems} (${pct}%)</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>`;
      }).join('')}
    </div>
  `;
}
</script>
</body>
</html>
