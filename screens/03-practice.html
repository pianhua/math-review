<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>练习 — 考研数学</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/app.css">
  <script src="../js/data.js"></script>
</head>
<body>
<div class="app-shell">
  <header class="top-header">
    <div class="brand">练习板块</div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="toggleTheme()" aria-label="切换主题">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <a href="../index.html" class="btn btn-ghost" style="font-size:0.85rem">返回</a>
    </div>
  </header>
  <section class="screen active" style="padding-top:calc(var(--header-height) + var(--space-4) + var(--safe-top))">
    <div id="practice-content"></div>
  </section>
</div>
<script>
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('mathreview:theme', next);
}
let currentProblemIdx = 0;
let practiceFilter = 'all';
let selectedOption = null;
let showExplanation = false;
const data = getMergedData();
const chapters = [...new Set(data.problems.map(p => p.chapter))];

function renderPractice() {
  let probs = practiceFilter === 'all' ? data.problems :
    practiceFilter === 'bookmarked' ? data.problems.filter(p => p.bookmarked) :
    data.problems.filter(p => p.chapter === practiceFilter);
  if (currentProblemIdx >= probs.length) currentProblemIdx = 0;
  const prob = probs[currentProblemIdx] || data.problems[0];
  const diffTag = prob.difficulty === 'basic' ? 'tag-basic' : prob.difficulty === 'advanced' ? 'tag-advanced' : 'tag-exam';
  const diffLabel = prob.difficulty === 'basic' ? '基础' : prob.difficulty === 'advanced' ? '强化' : '真题';

  document.getElementById('practice-content').innerHTML = `
    <h1 class="screen-title">练习板块</h1>
    <div class="flex gap-2 mb-4" style="flex-wrap:wrap">
      <button class="btn btn-sm ${practiceFilter==='all'?'btn-primary':'btn-secondary'}" onclick="setFilter('all')">全部</button>
      <button class="btn btn-sm ${practiceFilter==='bookmarked'?'btn-primary':'btn-secondary'}" onclick="setFilter('bookmarked')">收藏</button>
      ${chapters.map(c => `<button class="btn btn-sm ${practiceFilter===c?'btn-primary':'btn-secondary'}" onclick="setFilter('${c}')">${c}</button>`).join('')}
    </div>
    <div class="problem-card">
      <div class="problem-header">
        <span class="tag ${diffTag}">${diffLabel}</span>
        <span class="tag tag-source">${prob.source}</span>
        <span class="tag" style="background:var(--accent-bg);color:var(--accent)">${prob.type}</span>
      </div>
      <div class="problem-content katex-render" data-latex="${prob.content.replace(/"/g,'&quot;')}"></div>
      <div class="problem-options">
        ${prob.options.map(opt => {
          const cls = !selectedOption ? '' : selectedOption === opt.label ? (selectedOption === prob.correct ? 'correct' : 'wrong') : opt.label === prob.correct ? 'correct' : '';
          return `<button class="option-row ${cls}" onclick="${selectedOption?'':'selectOption(\''+opt.label+'\')'}" ${selectedOption?'disabled':''}>
            <span class="option-label">${opt.label}</span>
            <span class="katex-render" data-latex="${opt.text.replace(/"/g,'&quot;')}"></span>
          </button>`;
        }).join('')}
      </div>
      ${showExplanation ? `
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--space-4);margin-top:var(--space-3)">
          <div style="font-weight:600;margin-bottom:var(--space-2);color:var(--fg)">解析</div>
          <div class="katex-render" data-display="true" data-latex="${prob.explanation.replace(/"/g,'&quot;')}"></div>
        </div>
        <div class="flex gap-2 mt-3">
          <button class="btn btn-secondary btn-sm" onclick="resetProblem()">再做一题</button>
          <button class="btn btn-ghost btn-sm" onclick="toggleProblemBookmark('${prob.id}')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="${prob.bookmarked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            ${prob.bookmarked?'已收藏':'收藏'}
          </button>
        </div>
      ` : ''}
      ${!showExplanation ? `
        <div class="flex justify-between items-center mt-2">
          <span style="font-size:0.8rem;color:var(--dim)">第 ${currentProblemIdx + 1} / ${probs.length} 题</span>
          <div class="flex gap-2">
            <button class="btn btn-ghost btn-sm" onclick="prevProblem()" ${currentProblemIdx===0?'disabled':''}>上一题</button>
            <button class="btn btn-ghost btn-sm" onclick="nextProblem()" ${currentProblemIdx===probs.length-1?'disabled':''}>下一题</button>
          </div>
        </div>
      ` : ''}
    </div>
  `;
  if (typeof katex !== 'undefined') {
    document.querySelectorAll('.katex-render').forEach(el => {
      try { katex.render(el.dataset.latex, el, {displayMode: el.dataset.display==='true', throwOnError:false, trust:true, strict:false}); } catch(e) {}
    });
  }
}
function setFilter(f) { practiceFilter = f; currentProblemIdx = 0; selectedOption = null; showExplanation = false; renderPractice(); }
function nextProblem() { currentProblemIdx++; selectedOption = null; showExplanation = false; renderPractice(); }
function prevProblem() { currentProblemIdx--; selectedOption = null; showExplanation = false; renderPractice(); }
function selectOption(label) { selectedOption = label; showExplanation = true; renderPractice(); }
function resetProblem() { selectedOption = null; showExplanation = false; renderPractice(); }
function toggleProblemBookmark(id) {
  const marks = Storage.get('problemBookmarks', {});
  marks[id] = !marks[id];
  Storage.set('problemBookmarks', marks);
  renderPractice();
}
renderPractice();
</script>
</body>
</html>
