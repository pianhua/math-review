<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>知识点 — 考研数学</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/app.css">
  <script src="../js/data.js"></script>
</head>
<body>
<div class="app-shell">
  <header class="top-header">
    <div class="brand">知识点 · 公式背诵</div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="toggleTheme()" aria-label="切换主题">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <a href="../index.html" class="btn btn-ghost" style="font-size:0.85rem">返回</a>
    </div>
  </header>
  <section class="screen active" style="padding-top:calc(var(--header-height) + var(--space-4) + var(--safe-top))">
    <div id="formula-content"></div>
  </section>
</div>
<script>
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('mathreview:theme', next);
}
let formulaFilter = 'all';
const data = getMergedData();
const chapters = [...new Set(data.formulas.map(f => f.chapter))];

function renderFormulas() {
  const filtered = formulaFilter === 'all' ? data.formulas :
    formulaFilter === 'bookmarked' ? data.formulas.filter(f => f.bookmarked) :
    data.formulas.filter(f => f.chapter === formulaFilter);

  document.getElementById('formula-content').innerHTML = `
    <h1 class="screen-title">知识点 · 公式背诵</h1>
    <div class="flex gap-2 mb-4" style="flex-wrap:wrap">
      <button class="btn btn-sm ${formulaFilter==='all'?'btn-primary':'btn-secondary'}" onclick="setFilter('all')">全部</button>
      <button class="btn btn-sm ${formulaFilter==='bookmarked'?'btn-primary':'btn-secondary'}" onclick="setFilter('bookmarked')">收藏</button>
      ${chapters.map(c => `<button class="btn btn-sm ${formulaFilter===c?'btn-primary':'btn-secondary'}" onclick="setFilter('${c}')">${c}</button>`).join('')}
    </div>
    ${filtered.map(f => `
      <div class="formula-card">
        <div class="formula-header">
          <div>
            <div class="formula-title">${f.title}</div>
            <div class="formula-chapter">${f.chapter}</div>
          </div>
          <button class="bookmark-btn ${f.bookmarked?'bookmarked':''}" onclick="toggleBookmark('${f.id}')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="${f.bookmarked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          </button>
        </div>
        <div class="formula-body katex-render" data-display="true" data-latex="${f.latex.replace(/"/g,'&quot;')}"></div>
        <div class="formula-desc">${f.description}</div>
      </div>
    `).join('')}
  `;
  if (typeof katex !== 'undefined') {
    document.querySelectorAll('.katex-render').forEach(el => {
      try { katex.render(el.dataset.latex, el, {displayMode: el.dataset.display==='true', throwOnError:false, trust:true, strict:false}); } catch(e) {}
    });
  }
}
function setFilter(f) { formulaFilter = f; renderFormulas(); }
function toggleBookmark(id) {
  const marks = Storage.get('bookmarks', {});
  marks[id] = !marks[id];
  Storage.set('bookmarks', marks);
  renderFormulas();
}
renderFormulas();
</script>
</body>
</html>
