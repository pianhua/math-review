<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>今日任务 — 考研数学</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/app.css">
  <script src="../js/data.js"></script>
</head>
<body>
<div class="app-shell">
  <header class="top-header">
    <div class="brand">今日任务</div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="toggleTheme()" aria-label="切换主题">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <a href="../index.html" class="btn btn-ghost" style="font-size:0.85rem">返回</a>
    </div>
  </header>
  <section class="screen active" id="screen-home">
    <div id="home-content"></div>
  </section>
</div>
<script>
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('mathreview:theme', next);
}
const data = getMergedData();
const t = data.todayTasks;
const pct = Math.round((t.completed / t.totalProblems) * 100);
document.getElementById('home-content').innerHTML = `
  <h1 class="screen-title">${t.date}</h1>
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">今日复习</div>
        <div class="card-subtitle">预计 ${t.estimatedMinutes} 分钟 · 共 ${t.totalProblems} 题</div>
      </div>
      <div style="font-family:var(--font-display);font-size:1.8rem;color:var(--accent);">${pct}%</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-labels"><span>已完成 ${t.completed} 题</span><span>剩余 ${t.totalProblems - t.completed} 题</span></div>
  </div>
  <div class="card">
    <div class="card-title mb-3">章节任务</div>
    ${t.sections.map(s=>{
      const sp = Math.round((s.completed/s.problems)*100);
      return `<div class="mb-3">
        <div class="flex justify-between mb-1"><span style="font-size:0.9rem;font-weight:500">${s.name}</span><span style="font-size:0.8rem;color:var(--dim)">${s.completed}/${s.problems} 题</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${sp}%"></div></div>
      </div>`;
    }).join('')}
  </div>
  <div class="card" style="border-color:var(--accent);background:var(--accent-bg)">
    <div class="card-header"><div class="flex items-center gap-2"><span class="tag tag-ai">AI 推荐</span><span class="card-title" style="font-size:0.95rem">新增题目</span></div></div>
    ${t.aiSuggestions.map(ai=>`
      <div class="mb-3">
        <div class="flex items-center gap-2 mb-2">
          <span class="tag tag-${ai.difficulty==='basic'?'basic':ai.difficulty==='advanced'?'advanced':'exam'}">${ai.difficulty==='basic'?'基础':ai.difficulty==='advanced'?'强化':'真题'}</span>
          <span style="font-size:0.8rem;color:var(--dim)">${ai.chapter} · ${ai.type}</span>
        </div>
        <div class="formula-body katex-render" data-latex="${ai.content.replace(/"/g,'&quot;')}"></div>
      </div>
    `).join('')}
  </div>
  <div class="flex gap-3 mb-5">
    <a href="03-practice.html" class="btn btn-primary w-full" style="text-align:center">开始练习</a>
    <a href="02-formula.html" class="btn btn-secondary w-full" style="text-align:center">背诵公式</a>
  </div>
`;
if (typeof katex !== 'undefined') {
  document.querySelectorAll('.katex-render').forEach(el => {
    try { katex.render(el.dataset.latex, el, {throwOnError:false,trust:true,strict:false}); } catch(e) {}
  });
}
</script>
</body>
</html>
