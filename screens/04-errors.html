<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>错题本 — 考研数学</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/app.css">
  <script src="../js/data.js"></script>
</head>
<body>
<div class="app-shell">
  <header class="top-header">
    <div class="brand">错题本</div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="toggleTheme()" aria-label="切换主题">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <a href="../index.html" class="btn btn-ghost" style="font-size:0.85rem">返回</a>
    </div>
  </header>
  <section class="screen active" style="padding-top:calc(var(--header-height) + var(--space-4) + var(--safe-top))">
    <div id="errors-content"></div>
  </section>
</div>
<script>
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('mathreview:theme', next);
}
let errorFilter = 'all';
const data = getMergedData();
const chapters = [...new Set(data.errors.map(e => e.chapter))];

function renderErrors() {
  const filtered = errorFilter === 'all' ? data.errors : data.errors.filter(e => e.chapter === errorFilter);
  document.getElementById('errors-content').innerHTML = `
    <h1 class="screen-title">错题本</h1>
    <div class="stats-grid mb-4">
      <div class="stat-box">
        <div class="stat-value">${data.errors.length}</div>
        <div class="stat-label">错题总数</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${data.errors.filter(e=>e.reviewCount===0).length}</div>
        <div class="stat-label">待复习</div>
      </div>
    </div>
    <div class="flex gap-2 mb-4" style="flex-wrap:wrap">
      <button class="btn btn-sm ${errorFilter==='all'?'btn-primary':'btn-secondary'}" onclick="setFilter('all')">全部</button>
      ${chapters.map(c => `<button class="btn btn-sm ${errorFilter===c?'btn-primary':'btn-secondary'}" onclick="setFilter('${c}')">${c}</button>`).join('')}
    </div>
    ${filtered.map(e => {
      const prob = data.problems.find(p => p.id === e.problemId);
      return `
      <div class="list-item">
        <div class="list-item-left">
          <div class="list-item-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          </div>
          <div>
            <div class="list-item-title">${prob ? prob.chapter : e.chapter}</div>
            <div class="list-item-meta">${e.source} · 错选 ${e.wrongAnswer} · 正解 ${e.correctAnswer} · ${e.wrongDate}</div>
          </div>
        </div>
        <span class="tag ${e.reviewCount > 0 ? 'tag-basic' : 'tag-exam'}">${e.reviewCount > 0 ? '已复习 ' + e.reviewCount + ' 次' : '待复习'}</span>
      </div>
      `;
    }).join('')}
  `;
}
function setFilter(f) { errorFilter = f; renderErrors(); }
renderErrors();
</script>
</body>
</html>
