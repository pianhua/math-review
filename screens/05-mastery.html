<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>掌握度 — 考研数学</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/app.css">
  <script src="../js/data.js"></script>
</head>
<body>
<div class="app-shell">
  <header class="top-header">
    <div class="brand">掌握度</div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="toggleTheme()" aria-label="切换主题">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <a href="../index.html" class="btn btn-ghost" style="font-size:0.85rem">返回</a>
    </div>
  </header>
  <section class="screen active" style="padding-top:calc(var(--header-height) + var(--space-4) + var(--safe-top))">
    <div id="mastery-content"></div>
  </section>
</div>
<script>
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('mathreview:theme', next);
}
const data = getMergedData();
const m = data.mastery;
const overallPct = Math.round((m.totalCorrect / m.totalSolved) * 100) || 0;

// Radar chart
const chapters = m.chapters;
const n = chapters.length;
const size = 280;
const cx = size / 2;
const cy = size / 2;
const r = 100;
const maxVal = Math.max(...chapters.map(c => c.totalProblems));

function point(i, val) {
  const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
  const dist = (val / maxVal) * r;
  return `${cx + dist * Math.cos(angle)},${cy + dist * Math.sin(angle)}`;
}

const gridLevels = [0.25, 0.5, 0.75, 1];
const gridPolygons = gridLevels.map(level => {
  const pts = chapters.map((_, i) => point(i, maxVal * level)).join(' ');
  return `<polygon points="${pts}" fill="none" stroke="var(--border)" stroke-width="1"/>`;
}).join('');

const dataPts = chapters.map((c, i) => point(i, c.correct)).join(' ');
const labelPts = chapters.map((c, i) => {
  const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
  const lx = cx + (r + 22) * Math.cos(angle);
  const ly = cy + (r + 22) * Math.sin(angle);
  return `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="var(--muted)" font-family="var(--font-body)">${c.name}</text>`;
}).join('');

const axisLines = chapters.map((_, i) => {
  const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
  const x = cx + r * Math.cos(angle);
  const y = cy + r * Math.sin(angle);
  return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
}).join('');

document.getElementById('mastery-content').innerHTML = `
  <h1 class="screen-title">掌握度视图</h1>
  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-value">${m.totalSolved}</div>
      <div class="stat-label">总做题数</div>
    </div>
    <div class="stat-box">
      <div class="stat-value">${overallPct}%</div>
      <div class="stat-label">正确率</div>
    </div>
    <div class="stat-box">
      <div class="stat-value">${m.streakDays}</div>
      <div class="stat-label">连续打卡</div>
    </div>
    <div class="stat-box">
      <div class="stat-value">${Math.floor(m.totalStudyMinutes / 60)}h${m.totalStudyMinutes % 60}m</div>
      <div class="stat-label">学习时长</div>
    </div>
  </div>
  <div class="radar-container">
    <div class="card-title mb-3">章节掌握度</div>
    <svg class="radar-svg" viewBox="0 0 ${size} ${size}">
      ${gridPolygons}
      ${axisLines}
      <polygon points="${dataPts}" fill="rgba(201,100,66,0.15)" stroke="var(--accent)" stroke-width="2"/>
      ${chapters.map((c, i) => {
        const [x, y] = point(i, c.correct).split(',');
        return `<circle cx="${x}" cy="${y}" r="4" fill="var(--accent)"/>`;
      }).join('')}
      ${labelPts}
    </svg>
  </div>
  <div class="card">
    <div class="card-title mb-3">各章节详情</div>
    ${chapters.map(c => {
      const pct = Math.round((c.correct / c.totalProblems) * 100);
      return `
      <div class="mb-3">
        <div class="flex justify-between mb-1">
          <span style="font-size:0.9rem;font-weight:500">${c.name}</span>
          <span style="font-size:0.8rem;color:var(--dim)">${c.correct}/${c.totalProblems} (${pct}%)</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('')}
  </div>
`;
</script>
</body>
</html>
